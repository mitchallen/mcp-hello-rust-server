version: 2
# Keeps the image and its dependencies patched automatically. This is the
# "stay up to date" half of vulnerability management — image-scan.yml and
# cargo-audit.yml detect vulns, Dependabot opens the PRs that fix them. Low-risk
# updates (github-actions; cargo/docker minor+patch) are auto-merged once CI
# passes — see .github/workflows/dependabot-auto-merge.yml.
updates:
  # Rust dependencies (Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"

  # Base images in the Dockerfile (rust:1-alpine builder + chainguard/static runtime).
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "docker"

  # GitHub Actions used by the workflows (incl. the trivy-action pin).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
